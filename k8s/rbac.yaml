---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: llm-calculator
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: llm-calculator-bench
  namespace: default
rules:
  # Manage vLLM Deployments
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Service in front of vLLM
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Benchmark Jobs (and their auto-created Pods)
  - apiGroups: ["batch"]
    resources: ["jobs", "jobs/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Read pods + logs for status / debugging
  - apiGroups: [""]
    resources: ["pods", "pods/log", "pods/status"]
    verbs: ["get", "list", "watch"]

  # Read the hf-token secret (HF_TOKEN injection happens in the pod, but
  # listing/getting is sometimes useful from the controller).
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
    resourceNames: ["hf-token"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: llm-calculator-bench
  namespace: default
subjects:
  - kind: ServiceAccount
    name: llm-calculator
    namespace: default
roleRef:
  kind: Role
  name: llm-calculator-bench
  apiGroup: rbac.authorization.k8s.io
